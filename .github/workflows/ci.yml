name: CI

on:
  push:
  pull_request:

jobs:
  worker:
    name: Worker lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
      - name: Install deps
        working-directory: worker
        run: uv sync --all-extras
      - name: Ruff check
        working-directory: worker
        run: uv run ruff check src tests
      - name: Mypy
        working-directory: worker
        run: uv run mypy src
      - name: Pytest
        working-directory: worker
        run: uv run pytest
