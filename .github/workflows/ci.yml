name: CI

on:
  push:
  pull_request:

jobs:
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        working-directory: worker
        run: go build ./...
      - name: Test
        working-directory: worker
        run: go test ./...
